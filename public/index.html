<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Task</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
         integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
 </head>
 
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="/">Task</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>

    <!-- Form -->
    <div class="container my-3">
        <h1>Register Here</h1>
        <hr>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Name</label>
                <input type="text" class="form-control" name="username" id="username" placeholder="Enter Name"
                    autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="house">Flat, House no., Building, Company, Apartment</label>
                <input type="text" class="form-control" name="house" id="house" placeholder="Enter Flat/House"
                    autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="street">Area, Street, Sector, Village</label>
                <input type="text" class="form-control" name="street" id="street" placeholder="Enter Street"
                    autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" class="form-control" name="city" id="city" placeholder="Enter City"
                    autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="pin">Pincode</label>
                <input type="number" class="form-control" name="pin" id="pin" placeholder="Enter Pincode"
                    autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" class="form-control" name="state" id="state" placeholder="Enter State"
                    autocomplete="off" required>
            </div>

            <button type="submit" class="btn btn-dark" id="registerBtn" style="cursor: pointer;">Submit</button>
        </form>
    </div>

    <!--Display data  -->
    <div id="table" class="container my-5">
        <h1>Your Details</h1>
        <hr>
        <table class="table table-dark">
            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Apartment</th>
                    <th scope="col">Street</th>
                    <th scope="col">City</th>
                    <th scope="col">Pincode</th>
                    <th scope="col">State</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Populate -->
            </tbody>
        </table>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
</body>

</html>
